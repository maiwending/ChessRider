      <rect x="64" y="40" width="42" height="42" rx="6" fill="#594331"/>
      <rect x="112" y="40" width="42" height="42" rx="6" fill="#3d2f22"/>
      <rect x="160" y="40" width="42" height="42" rx="6" fill="#594331"/>
      <rect x="208" y="40" width="42" height="42" rx="6" fill="#3d2f22"/>
      <rect x="256" y="40" width="42" height="42" rx="6" fill="#594331"/>
