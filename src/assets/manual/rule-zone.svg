<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-labelledby="title desc">
  <title id="title">Knight Support Zone</title>
  <desc id="desc">Squares near a friendly knight where a piece can gain jump ability.</desc>
  <rect x="0" y="0" width="360" height="220" rx="14" fill="#17120e"/>
  <g transform="translate(60,30)">
    <rect x="0" y="0" width="240" height="160" rx="8" fill="#2a2018" stroke="#6f5942" stroke-width="2"/>
    <g>
      <rect x="0" y="0" width="48" height="32" fill="#3d2f22"/>
      <rect x="96" y="0" width="48" height="32" fill="#3d2f22"/>
      <rect x="192" y="0" width="48" height="32" fill="#3d2f22"/>
      <rect x="48" y="32" width="48" height="32" fill="#3d2f22"/>
      <rect x="144" y="32" width="48" height="32" fill="#3d2f22"/>
      <rect x="0" y="64" width="48" height="32" fill="#3d2f22"/>
      <rect x="96" y="64" width="48" height="32" fill="#3d2f22"/>
      <rect x="192" y="64" width="48" height="32" fill="#3d2f22"/>
      <rect x="48" y="96" width="48" height="32" fill="#3d2f22"/>
      <rect x="144" y="96" width="48" height="32" fill="#3d2f22"/>
      <rect x="0" y="128" width="48" height="32" fill="#3d2f22"/>
      <rect x="96" y="128" width="48" height="32" fill="#3d2f22"/>
      <rect x="192" y="128" width="48" height="32" fill="#3d2f22"/>
    </g>
    <g fill="#4ea36b" opacity="0.65">
      <rect x="96" y="64" width="48" height="32" rx="4"/>
      <rect x="48" y="64" width="48" height="32" rx="4"/>
      <rect x="144" y="64" width="48" height="32" rx="4"/>
      <rect x="96" y="32" width="48" height="32" rx="4"/>
      <rect x="96" y="96" width="48" height="32" rx="4"/>
      <rect x="48" y="32" width="48" height="32" rx="4"/>
      <rect x="144" y="32" width="48" height="32" rx="4"/>
      <rect x="48" y="96" width="48" height="32" rx="4"/>
      <rect x="144" y="96" width="48" height="32" rx="4"/>
      <rect x="0" y="32" width="48" height="32" rx="4"/>
      <rect x="0" y="96" width="48" height="32" rx="4"/>
      <rect x="192" y="32" width="48" height="32" rx="4"/>
      <rect x="192" y="96" width="48" height="32" rx="4"/>
    </g>
    <rect x="96" y="64" width="48" height="32" rx="5" fill="#e88c3a" opacity="0.95"/>
    <text x="120" y="86" text-anchor="middle" fill="#1a120b" font-size="20" font-family="Arial" font-weight="700">N</text>
    <text x="120" y="182" text-anchor="middle" fill="#f6eee2" font-size="13" font-family="Arial">Green squares = jump enabled near your knight</text>
  </g>
</svg>
