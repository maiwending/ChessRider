name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_AI_DIFFICULTY: medium
          VITE_FIREBASE_API_KEY: AIzaSyBVcj5qUnja3OAPjAyyCAQGv3n7knMGlaQ
          VITE_FIREBASE_AUTH_DOMAIN: chessrider-832d7.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: chessrider-832d7
          VITE_FIREBASE_STORAGE_BUCKET: chessrider-832d7.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "942548928546"
          VITE_FIREBASE_APP_ID: "1:942548928546:web:583e6ae98f63a7b9da227b"
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
